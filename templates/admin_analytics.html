<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analytics Hub - InternHub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 20px; }
        .chart-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .chart-card h3 { color: #1e293b; margin-bottom: 20px; font-size: 1.1rem; border-bottom: 2px solid #f8fafc; padding-bottom: 10px; }
        .full-width { grid-column: span 2; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="InternHub Logo">
            <span>Admin</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/admin/dashboard"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
            <a href="/admin/students"><i class="fa-solid fa-graduation-cap"></i> Students</a>
            <a href="/admin/organizations"><i class="fa-solid fa-building"></i> Organizations</a>
            <a href="/admin/allocations"><i class="fa-solid fa-user-check"></i> Allocations</a>
            <a href="/admin/analytics" class="active"><i class="fa-solid fa-chart-pie"></i> Analytics</a>
            <a href="/admin/reports"><i class="fa-solid fa-chart-line"></i> Reports</a>
            <a href="/admin/audit-logs"><i class="fa-solid fa-file-shield"></i> Audit Logs</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-nav">
            <div class="user-avatar">A</div>
        </div>

        <div class="dashboard-container">
            <div class="admin-banner">
                <h1>System Analytics</h1>
                <p>Detailed visual insights into placements and performance.</p>
            </div>

            <div class="analytics-grid">
                <div class="chart-card">
                    <h3><i class="fa-solid fa-circle-half-stroke"></i> Placement Success Rate</h3>
                    <div style="height: 300px;"><canvas id="statusPieChart"></canvas></div>
                </div>

                <div class="chart-card">
                    <h3><i class="fa-solid fa-building-user"></i> Placements by Organization</h3>
                    <div style="height: 300px;"><canvas id="orgBarChart"></canvas></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Colors synchronized with your system branding
        const colors = ['#f59e0b', '#10b981', '#ef4444', '#3b82f6', '#8b5cf6'];

        // Pie Chart Configuration
        new Chart(document.getElementById('statusPieChart'), {
            type: 'doughnut',
            data: {
                labels: [{% for item in status_data %}"{{ item.status|capitalize }}",{% endfor %}],
                datasets: [{
                    data: [{% for item in status_data %}{{ item.count }},{% endfor %}],
                    backgroundColor: colors,
                    hoverOffset: 15
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });

        // Bar Chart Configuration
        new Chart(document.getElementById('orgBarChart'), {
            type: 'bar',
            data: {
                labels: [{% for item in org_data %}"{{ item.org_name }}",{% endfor %}],
                datasets: [{
                    label: 'Accepted Students',
                    data: [{% for item in org_data %}{{ item.student_count }},{% endfor %}],
                    backgroundColor: '#1e293b',
                    borderRadius: 6
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true, grid: { display: false } }, x: { grid: { display: false } } }
            }
        });
    </script>
</body>
</html>
