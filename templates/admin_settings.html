<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Settings - InternHub Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">...</div> 

    <div class="main-content">
        <div class="top-nav">
            <div class="user-avatar" style="background: #e2e8f0; color: #475569;">A</div>
        </div>

        <div class="dashboard-container">
            <h2 style="color: #1e293b; margin-bottom: 20px;">System Settings</h2>

            <div class="content-card" style="background: white; padding: 30px; border-radius: 12px; border: 1px solid #e2e8f0;">
                <form action="/admin/settings" method="POST">
                    
                    <h4 style="margin-bottom: 15px; color: #334155;"><i class="fa-solid fa-sliders"></i> Application Controls</h4>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
                        <div style="padding: 15px; border: 1px solid #f1f5f9; border-radius: 8px;">
                            <label style="font-weight: 600; font-size: 14px; display: block;">Registration Status</label>
                            <p style="font-size: 12px; color: #64748b; margin-bottom: 10px;">Allow new organizations to join</p>
                            <select name="reg_status" class="form-input">
                                <option value="open">Open</option>
                                <option value="closed">Closed (Maintenance)</option>
                            </select>
                        </div>
                        <div style="padding: 15px; border: 1px solid #f1f5f9; border-radius: 8px;">
                            <label style="font-weight: 600; font-size: 14px; display: block;">Application Deadline</label>
                            <p style="font-size: 12px; color: #64748b; margin-bottom: 10px;">Global cutoff date for students</p>
                            <input type="date" name="global_deadline" class="form-input">
                        </div>
                    </div>

                    <h4 style="margin-bottom: 15px; color: #334155;"><i class="fa-solid fa-shield-halved"></i> Security & Authentication</h4>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div>
                            <label class="form-label">Admin Email</label>
                            <input type="email" name="admin_email" class="form-input" value="admin@internhub.com">
                        </div>
                        <div>
                            <label class="form-label">Update Password</label>
                            <input type="password" name="new_password" class="form-input" placeholder="Enter new password">
                        </div>
                    </div>

                    <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #f1f5f9; display: flex; justify-content: flex-end;">
                        <button type="submit" class="save-btn" style="background: #1e293b;">Update System Settings</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>


<div class="stat-card">
    <div class="stat-info">
        <h4>Internship Postings</h4> <span>{{ slots }}</span>
    </div>
    <i class="fa-solid fa-briefcase" style="color: #0d9488; opacity: 0.5;"></i>
</div>
