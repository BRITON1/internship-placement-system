<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Profile - InternHub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo">
            <span>Admin</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/admin/dashboard"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
            <a href="/admin/students" class="active"><i class="fa-solid fa-graduation-cap"></i> Students</a>
            <a href="/admin/organizations"><i class="fa-solid fa-building"></i> Organizations</a>
            <a href="/admin/reports"><i class="fa-solid fa-chart-line"></i> Reports</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="dashboard-container">
            <div style="margin-bottom: 20px;">
                <a href="/admin/students" style="text-decoration: none; color: #64748b;"><i class="fa-solid fa-arrow-left"></i> Back to Students</a>
            </div>
            
            <h2 style="color: #1e293b; margin-bottom: 25px;">Student Profile</h2>

            <div class="content-card" style="background: white; padding: 30px; border-radius: 12px; border: 1px solid #e2e8f0;">
                <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid #f1f5f9; padding-bottom: 20px;">
                    <div style="width: 80px; height: 80px; background: #3b82f6; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold;">
                        {{ student.full_name[0] }}
                    </div>
                    <div>
                        <h3 style="font-size: 24px; color: #1e293b;">{{ student.full_name }}</h3>
                        <p style="color: #64748b;">Student ID: #{{ student.id }}</p>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <label style="display: block; font-size: 12px; color: #94a3b8; text-transform: uppercase; font-weight: bold;">Email Address</label>
                        <p style="font-size: 16px; color: #1e293b; margin-top: 5px;">{{ student.email }}</p>
                    </div>
                    <div>
                        <label style="display: block; font-size: 12px; color: #94a3b8; text-transform: uppercase; font-weight: bold;">Account Status</label>
                        <p style="font-size: 16px; color: #10b981; margin-top: 5px;">Active</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
