<!DOCTYPE html>
<html>
<head>
    <title>Login - InternHub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .form-box { background: rgba(0,0,0,0.2); padding: 40px; border-radius: 10px; max-width: 400px; margin: 100px auto; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #4a5568; background: #1a202c; color: white; }
    </style>
</head>
<body>
    <div class="form-box">
        <h2>Sign In</h2>
        <form method="POST" action="/login">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <br><br>
            <button type="submit" class="btn btn-green" style="border:none; width: 100%;">Login</button>
        </form>
    </div>
</body>
</html>
