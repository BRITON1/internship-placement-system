<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Student Assessment - InternHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .assessment-container { max-width: 800px; margin: 50px auto; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .score-label { font-weight: bold; color: #1e293b; }
        .score-input { width: 80px; text-align: center; font-weight: bold; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container assessment-container">
    <div class="mb-4">
        <a href="{{ url_for('view_assessments') }}" class="text-decoration-none text-muted">
            <i class="fas fa-arrow-left me-2"></i> Back to Assessments
        </a>
    </div>

    <div class="card p-5">
        <h2 class="fw-bold mb-2">Technical Assessment</h2>
        <p class="text-muted mb-4">Evaluate the student based on their performance throughout the attachment period.</p>

        <form action="{{ url_for('new_assessment') }}" method="POST">
            <div class="mb-4">
                <label class="form-label fw-bold">Select Student</label>
                <select name="student_id" class="form-select form-select-lg" required>
                    <option value="" selected disabled>Choose a student...</option>
                    {% for student in students %}
                    <option value="{{ student.id }}">{{ student.full_name }} ({{ student.email }})</option>
                    {% endfor %}
                </select>
            </div>

            <hr class="my-4">

            <div class="row g-4">
                <div class="col-md-6">
                    <label class="score-label d-block mb-2">Attendance & Punctuality (0-25)</label>
                    <input type="number" name="attendance" class="form-control score-input" min="0" max="25" placeholder="0" required>
                </div>

                <div class="col-md-6">
                    <label class="score-label d-block mb-2">Technical Skill Mastery (0-25)</label>
                    <input type="number" name="skills" class="form-control score-input" min="0" max="25" placeholder="0" required>
                </div>

                <div class="col-md-6">
                    <label class="score-label d-block mb-2">Adaptability & Teamwork (0-25)</label>
                    <input type="number" name="attitude" class="form-control score-input" min="0" max="25" placeholder="0" required>
                </div>

                <div class="col-md-6">
                    <label class="score-label d-block mb-2">Communication & Reports (0-25)</label>
                    <input type="number" name="overall" class="form-control score-input" min="0" max="25" placeholder="0" required>
                </div>
            </div>

            <div class="mt-4 mb-4">
                <label class="form-label fw-bold">General Supervisor Remarks</label>
                <textarea name="comments" class="form-control" rows="4" placeholder="Summarize the student's overall performance and areas for improvement..."></textarea>
            </div>

            <div class="alert alert-info py-2 small">
                <i class="fas fa-info-circle me-2"></i> The system will automatically calculate the total grade out of 100.
            </div>

            <button type="submit" class="btn btn-dark btn-lg w-100 mt-3">
                <i class="fas fa-save me-2"></i> Submit Final Assessment
            </button>
        </form>
    </div>
</div>

</body>
</html>
