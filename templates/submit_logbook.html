<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Daily Log - InternHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .form-card { background: white; border-radius: 15px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn-primary { background-color: #1e293b; border: none; padding: 12px; }
        .btn-primary:hover { background-color: #334155; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="mb-4">
                <a href="{{ url_for('student_dashboard') }}" class="text-decoration-none text-muted">
                    <i class="fas fa-arrow-left me-2"></i> Back to Dashboard
                </a>
            </div>
            
            <div class="card form-card p-4 p-md-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Daily Log Entry</h2>
                    <p class="text-muted">Record your activities and learning for today.</p>
                </div>

                <form action="{{ url_for('submit_logbook') }}" method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Activity Date</label>
                            <input type="date" name="activity_date" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Internship Week</label>
                            <select name="week_number" class="form-select" required>
                                {% for i in range(1, 13) %}
                                <option value="{{ i }}">Week {{ i }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-12 mb-3">
                            <label class="form-label fw-bold">Description of Activities</label>
                            <textarea name="description" class="form-control" rows="5" 
                                placeholder="What did you work on today? List tasks, tools used, and skills applied..." required></textarea>
                            <div class="form-text text-end">Focus on technical tasks and learning outcomes.</div>
                        </div>

                        <div class="col-12 mb-4">
                            <label class="form-label fw-bold text-danger">Challenges & Blockers (Optional)</label>
                            <textarea name="challenges" class="form-control" rows="2" 
                                placeholder="Any difficulties faced or areas where you need guidance?"></textarea>
                        </div>

                        <div class="col-12">
                            <button type="submit" class="btn btn-primary w-100 fw-bold">
                                <i class="fas fa-paper-plane me-2"></i> Submit Log to Supervisor
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
