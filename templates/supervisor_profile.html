<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile - Supervisor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo">
            <span>Supervisor</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/supervisor/dashboard"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
            <a href="/supervisor/assigned-students"><i class="fa-solid fa-users"></i> Assigned Students</a>
            <a href="/supervisor/logbooks"><i class="fa-solid fa-book-open"></i> Logbooks</a>
            <a href="/supervisor/assessments"><i class="fa-solid fa-clipboard-check"></i> Assessments</a>
            <a href="/supervisor/profile" class="active"><i class="fa-solid fa-user"></i> Profile</a>
            <hr style="border: 0.5px solid #2d3748; margin: 20px 0;">
            <a href="/logout"><i class="fa-solid fa-arrow-right-from-bracket"></i> Sign Out</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-nav">
            <div class="user-avatar" style="background: #d1fae5; color: #059669;">{{ initial }}</div>
        </div>

        <div class="dashboard-container">
            <h2 style="color: #1e293b; margin-bottom: 25px;">My Profile</h2>

            <div class="content-card" style="background: white; padding: 40px; border-radius: 12px; border: 1px solid #e2e8f0; max-width: 900px;">
                <h4 style="margin-bottom: 30px; color: #1e293b; font-weight: 600;">Personal Details</h4>

                <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 40px;">
                    <div style="width: 100px; height: 100px; background: #d1fae5; color: #059669; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: bold;">
                        {{ initial }}
                    </div>
                    <div>
                        <h3 style="font-size: 20px; color: #1e293b;">{{ user.full_name }}</h3>
                        <p style="color: #94a3b8; font-size: 14px;">Click the avatar to upload a new photo</p>
                    </div>
                </div>

                <form action="/supervisor/profile" method="POST">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px;">
                        <div>
                            <label style="display: block; font-size: 14px; color: #1e293b; font-weight: 500; margin-bottom: 8px;">First Name</label>
                            <input type="text" name="first_name" value="{{ first_name }}" style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc;">
                        </div>
                        <div>
                            <label style="display: block; font-size: 14px; color: #1e293b; font-weight: 500; margin-bottom: 8px;">Last Name</label>
                            <input type="text" name="last_name" value="{{ last_name }}" style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc;">
                        </div>
                    </div>

                    <div style="margin-bottom: 30px;">
                        <label style="display: block; font-size: 14px; color: #1e293b; font-weight: 500; margin-bottom: 8px;">Email</label>
                        <input type="email" name="email" value="{{ user.email }}" style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; color: #94a3b8;">
                    </div>

                    <button type="submit" style="background: #1e293b; color: white; padding: 12px 30px; border: none; border-radius: 8px; font-weight: 500; cursor: pointer;">Save Changes</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
